name: Build high-quality Coulomb DOCX

on:
  push:
    branches: [main]
    paths:
      - 'tools/build_coulomb_high_quality_docx.py'
      - '.github/workflows/build-coulomb-high-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DOCX
        run: python tools/build_coulomb_high_quality_docx.py

      - name: Commit generated DOCX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/一题三变_第九章_库仑定律_高质量版.docx"
          if ! git diff --cached --quiet; then
            git commit -m "生成库仑定律一题三变高质量 Word"
            git push
          fi
