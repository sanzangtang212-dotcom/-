name: Build Coulomb Example 2 publishing DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_coulomb_example2_publishing_docx.py'
      - '.github/workflows/build-coulomb-high-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and self-check DOCX
        id: build
        shell: bash
        run: |
          set +e
          python tools/build_coulomb_example2_publishing_docx.py > example2-build.log 2>&1
          status=$?
          cat example2-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        if: steps.build.outputs.status != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p debug
          cp example2-build.log debug/example2-build.log
          git add debug/example2-build.log
          if ! git diff --cached --quiet; then
            git commit -m "记录库仑定律例题2 Word 构建日志"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Stop on build failure
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Independent package validation
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变加高考真题_库仑定律例题2_出版规范版.docx')
          assert p.exists() and p.stat().st_size > 5000, p
          with ZipFile(p) as z:
              required = {
                  '[Content_Types].xml', '_rels/.rels', 'word/document.xml',
                  'word/styles.xml', 'word/settings.xml',
                  'word/_rels/document.xml.rels'
              }
              assert required.issubset(set(z.namelist()))
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              ET.fromstring(z.read('word/styles.xml'))
              ET.fromstring(z.read('word/settings.xml'))
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ'
              assert not any(ch in xml for ch in forbidden)
              assert '<w:vertAlign w:val="superscript"/>' in xml
              assert '<w:vertAlign w:val="subscript"/>' in xml
              assert '<m:sSub>' in xml and '<m:sSup>' in xml
              assert '<m:f>' in xml and '<m:oMathPara>' in xml
              assert '<m:rad>' in xml
              assert xml.count('【题目】') == 4
              assert xml.count('【答案】') == 4
              assert xml.count('【解析】') == 4
              assert '2003年普通高等学校招生全国统一考试' in xml
              assert '故选B' in xml
              assert '0.17 N' in xml
              assert 'Q与L无关' in xml
          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit generated DOCX to source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/一题三变加高考真题_库仑定律例题2_出版规范版.docx"
          if ! git diff --cached --quiet; then
            git commit -m "生成库仑定律例题2一题三变加高考真题出版规范版 Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: coulomb-example2-publishing-docx
          path: downloads/一题三变加高考真题_库仑定律例题2_出版规范版.docx
