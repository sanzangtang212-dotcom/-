name: Build compact OMML Coulomb DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_coulomb_high_quality_docx.py'
      - '.github/workflows/build-coulomb-high-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DOCX
        run: python tools/build_coulomb_high_quality_docx.py

      - name: Validate compact OMML formatting
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变_第九章_库仑定律_角标紧凑修正版.docx')
          assert p.exists() and p.stat().st_size > 5000, p
          with ZipFile(p) as z:
              required = {
                  '[Content_Types].xml', '_rels/.rels', 'word/document.xml',
                  'word/styles.xml', 'word/_rels/document.xml.rels'
              }
              assert required.issubset(set(z.namelist()))
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              ET.fromstring(z.read('word/styles.xml'))
              assert xml.count('<m:sSub>') >= 25
              assert xml.count('<m:sSup>') >= 25
              assert xml.count('<m:oMath>') >= 30
              assert '<m:sty m:val="p"/>' in xml
              assert 'Times New Roman' in xml
              # 禁止用 Unicode 伪上标、伪下标和下划线模拟角标
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ_'
              assert not any(ch in xml for ch in forbidden)
              # 多字符说明性角标必须作为同一个正体下标节点
              assert '<m:t>GD</m:t>' in xml
              assert '<m:t>GH</m:t>' in xml
          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit generated DOCX to source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/一题三变_第九章_库仑定律_角标紧凑修正版.docx"
          if ! git diff --cached --quiet; then
            git commit -m "生成库仑定律角标紧凑修正版 Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: coulomb-law-compact-omml-docx
          path: downloads/一题三变_第九章_库仑定律_角标紧凑修正版.docx
