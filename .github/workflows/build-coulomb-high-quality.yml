name: Build Coulomb publishing DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_coulomb_high_quality_docx.py'
      - '.github/workflows/build-coulomb-high-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DOCX
        run: python tools/build_coulomb_high_quality_docx.py

      - name: Validate publishing-standard DOCX
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变加高考真题_第九章_库仑定律_出版规范版.docx')
          assert p.exists() and p.stat().st_size > 12000, p

          with ZipFile(p) as z:
              required = {
                  '[Content_Types].xml', '_rels/.rels', 'word/document.xml',
                  'word/styles.xml', 'word/settings.xml',
                  'word/_rels/document.xml.rels'
              }
              assert required.issubset(set(z.namelist()))
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              ET.fromstring(z.read('word/styles.xml'))
              ET.fromstring(z.read('word/settings.xml'))

              # 真上、下标与 OMML 结构数量检查
              assert xml.count('<w:vertAlign w:val="superscript"/>') >= 15
              assert xml.count('<w:vertAlign w:val="subscript"/>') >= 15
              assert xml.count('<m:sSub>') >= 20
              assert xml.count('<m:sSup>') >= 20
              assert xml.count('<m:f>') >= 25
              assert xml.count('<m:oMathPara>') >= 25

              # 禁止 Unicode 伪上标、伪下标
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ'
              assert not any(ch in xml for ch in forbidden)

              # 多字符说明性下标必须整体进入 OMML 下标节点
              assert '<m:t>GD</m:t>' in xml
              assert '<m:t>GH</m:t>' in xml
              assert '<m:t>eD</m:t>' in xml
              assert '<m:t>eH</m:t>' in xml

              # 高考真题来源与核心答案必须写入
              assert '2023年高考新课标卷物理第12题' in xml
              assert '8∶1' in xml
              assert '4∶1' in xml
              assert 'Book Antiqua' in xml
              assert 'Times New Roman' in xml

          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit generated DOCX to source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/一题三变加高考真题_第九章_库仑定律_出版规范版.docx"
          if ! git diff --cached --quiet; then
            git commit -m "生成库仑定律一题三变加高考真题出版规范版 Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: coulomb-law-gaokao-publishing-docx
          path: downloads/一题三变加高考真题_第九章_库仑定律_出版规范版.docx
