name: Build potential-difference publishing DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_potential_difference_example_docx.py'
      - '.github/workflows/build-coulomb-high-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch generator and build DOCX
        id: build
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('tools/build_potential_difference_example_docx.py')
          text = p.read_text(encoding='utf-8')
          replacements = [
              (
                  "cn(' 的正点电荷从A点移动到C点，求静电力做的功。'))\nparts.append(plain('（4）若A、B、C三点位于同一条电场线上",
                  "cn(' 的正点电荷从A点移动到C点，求静电力做的功。')))\nparts.append(plain('（4）若A、B、C三点位于同一条电场线上"
              ),
              (
                  "cn(' 的正点电荷从A点移动到C点时静电力做的功。'))\nparts.append(label('【答案】'))",
                  "cn(' 的正点电荷从A点移动到C点时静电力做的功。')))\nparts.append(label('【答案】'))"
              ),
          ]
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
          p.write_text(text, encoding='utf-8')
          PY
          set +e
          python tools/build_potential_difference_example_docx.py > potential-build.log 2>&1
          status=$?
          cat potential-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        if: steps.build.outputs.status != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p debug
          cp potential-build.log debug/potential-build.log
          git add debug/potential-build.log
          if ! git diff --cached --quiet; then
            git commit -m "更新电势差 Word 构建自检日志"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Stop on build failure
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Independent package validation
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变加高考真题_第十章_电势差_出版规范版.docx')
          assert p.exists() and p.stat().st_size > 7000, p
          with ZipFile(p) as z:
              required = {
                  '[Content_Types].xml', '_rels/.rels', 'word/document.xml',
                  'word/styles.xml', 'word/settings.xml',
                  'word/_rels/document.xml.rels'
              }
              assert required.issubset(set(z.namelist()))
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              ET.fromstring(z.read('word/styles.xml'))
              ET.fromstring(z.read('word/settings.xml'))
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ'
              assert not any(ch in xml for ch in forbidden)
              assert '<w:vertAlign w:val="superscript"/>' in xml
              assert '<w:vertAlign w:val="subscript"/>' in xml
              assert '<m:sSub>' in xml and '<m:sSup>' in xml
              assert '<m:f>' in xml and '<m:oMathPara>' in xml
              assert '<w:tbl>' in xml
              assert xml.count('【题目】') == 4
              assert xml.count('【答案】') == 4
              assert xml.count('【解析】') == 4
              assert '2020年普通高等学校招生全国统一考试江苏卷物理第9题' in xml
              assert 'A、B。' in xml
              assert 'φC>φA>φB' in xml
              assert 'E=200 V/m' in xml
              assert 'CA∶AB=3∶2' in xml
              assert 'TODO' not in xml and '�' not in xml
          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit corrected generator and DOCX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f debug/potential-build.log
          git add -A tools/build_potential_difference_example_docx.py "downloads/一题三变加高考真题_第十章_电势差_出版规范版.docx" debug/potential-build.log
          if ! git diff --cached --quiet; then
            git commit -m "固化电势差出版规范版生成器与Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: potential-difference-publishing-docx
          path: downloads/一题三变加高考真题_第十章_电势差_出版规范版.docx
