name: Build potential-difference Gaokao 2015 DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_potential_difference_gaokao_2015.py'
      - '.github/workflows/build-potential-difference-gaokao-2015.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and self-check DOCX
        run: python tools/build_potential_difference_gaokao_2015.py

      - name: Independent validation
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变加高考真题_第十章_电势差_高考题替换版.docx')
          assert p.exists() and p.stat().st_size > 7000, p
          with ZipFile(p) as z:
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              ET.fromstring(z.read('word/styles.xml'))
              ET.fromstring(z.read('word/settings.xml'))
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ'
              assert not any(ch in xml for ch in forbidden)
              for token in ['UAB', 'UBC', 'UAC', 'WAB', 'WBC', 'WAC', 'φA', 'φB', 'φC', 'φM', 'φN', 'φP', 'φQ']:
                  assert token not in xml
              assert '<w:vertAlign w:val="superscript"/>' in xml
              assert '<w:vertAlign w:val="subscript"/>' in xml
              assert '<m:sSub>' in xml and '<m:sSup>' in xml and '<m:f>' in xml
              assert '<m:oMathPara>' in xml and '<w:tbl>' in xml
              assert xml.count('【题目】') == 4
              assert xml.count('【答案】') == 4
              assert xml.count('【解析】') == 4
              assert '2015年普通高等学校招生全国统一考试新课标全国卷Ⅰ理科综合物理第15题' in xml
              assert 'B。' in xml
              assert '直线c位于某一等势面内' in xml
              assert 'M、Q两点电势相等' in xml
              for bad in ['TODO', '待补充', 'XXXX', '�']:
                  assert bad not in xml
          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit generated DOCX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/一题三变加高考真题_第十章_电势差_高考题替换版.docx"
          if ! git diff --cached --quiet; then
            git commit -m "生成电势差高考题替换版Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: potential-difference-gaokao-2015
          path: downloads/一题三变加高考真题_第十章_电势差_高考题替换版.docx
