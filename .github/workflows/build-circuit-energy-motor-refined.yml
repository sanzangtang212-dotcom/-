name: Build refined circuit-energy motor DOCX

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_circuit_energy_motor_refined.py'
      - '.github/workflows/build-circuit-energy-motor-refined.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx pillow

      - name: Build and self-check DOCX
        id: build
        shell: bash
        run: |
          set +e
          python tools/build_circuit_energy_motor_refined.py > circuit-energy-build.log 2>&1
          status=$?
          cat circuit-energy-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        if: steps.build.outputs.status != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p debug
          cp circuit-energy-build.log debug/circuit-energy-build.log
          git add debug/circuit-energy-build.log
          if ! git diff --cached --quiet; then
            git commit -m "记录电路中的能量转化Word构建日志"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Stop on build failure
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Independent validation
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import xml.etree.ElementTree as ET

          p = Path('downloads/一题三变加高考真题_第十二章_电路中的能量转化_精修版.docx')
          assert p.exists() and p.stat().st_size > 25000, p
          with ZipFile(p) as z:
              names = set(z.namelist())
              assert 'word/document.xml' in names
              assert 'word/styles.xml' in names
              assert any(n.startswith('word/media/') for n in names)
              xml = z.read('word/document.xml').decode('utf-8')
              ET.fromstring(xml)
              forbidden = '⁰¹²³⁴⁵⁶⁷⁸⁹⁻₀₁₂₃₄₅₆₇₈₉ₑₚ'
              assert not any(ch in xml for ch in forbidden)
              assert xml.count('【题目】') == 5
              assert xml.count('【答案】') == 5
              assert xml.count('【解析】') == 5
              assert '<m:oMathPara' in xml
              assert '<m:f>' in xml and '<m:sSub>' in xml and '<m:sSup>' in xml
              assert '2022年1月浙江省普通高校招生选考科目考试物理第12题' in xml
              for text in ['150 W', '950 W', '83.3%', '8.0 W', '825 W', '8.25 m/s', '20 A', 'D。']:
                  assert text in xml
              for bad in ['TODO', '待补充', 'XXXX', '�']:
                  assert bad not in xml
          print(f'validated: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit generated DOCX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f debug/circuit-energy-build.log
          git add -A tools/build_circuit_energy_motor_refined.py "downloads/一题三变加高考真题_第十二章_电路中的能量转化_精修版.docx" debug/circuit-energy-build.log
          if ! git diff --cached --quiet; then
            git commit -m "生成电路中的能量转化一题三变加高考真题精修版Word"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuit-energy-motor-refined
          path: downloads/一题三变加高考真题_第十二章_电路中的能量转化_精修版.docx
